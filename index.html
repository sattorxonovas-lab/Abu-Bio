<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My || Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 1. EKRANNI QOTIRISH VA ASOSIY SOZLAMALAR */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Sayt tepa-pastga harakatlanmaydi */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. KIRISH ANIMATSIYASI (ISMLAR) */
        .intro-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: #000;
        }

        #surname {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: bold;
            text-shadow: 0 0 20px #0077ff;
            position: absolute;
            top: -150px; /* Tepadan tashqarida */
            transition: all 3s ease-in-out; /* SEKIN TUSHISH */
        }

        #firstname {
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            font-weight: bold;
            text-shadow: 0 0 20px #0077ff;
            position: absolute;
            bottom: -150px; /* Pastdan tashqarida */
            transition: all 3s ease-in-out; /* SEKIN CHIQISH */
        }

        /* Ismlar ramka ustiga o'tgandagi holati */
        .surname-top { top: 5% !important; transform: scale(0.7); }
        .firstname-top { top: 12% !important; bottom: auto !important; transform: scale(0.7); }

        /* 3. ASOSIY KONTENT (RAMKA) */
        .wrapper {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            width: 95%;
            max-width: 1000px;
            transition: opacity 1.5s ease;
            margin-top: 100px; /* Ismlarga joy */
        }

        .main-card {
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid #0077ff;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 119, 255, 0.3);
        }

        .left-side { flex: 1; display: flex; justify-content: center; align-items: center; }
        .profile-img {
            width: 100%; max-width: 350px;
            border-radius: 15px; border: 2px solid #0077ff;
            cursor: pointer;
        }

        .right-side {
            flex: 1.2; padding-left: 30px;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        .info-item {
            font-size: clamp(0.9rem, 1.8vw, 1.2rem);
            text-shadow: 0 0 10px #0077ff;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 119, 255, 0.1);
        }

        /* 4. FOOTER (IJTIMOIY TARMOQLAR) */
        .footer { margin-top: 25px; text-align: center; }
        .social-icons { display: flex; gap: 40px; justify-content: center; margin-top: 15px; }
        .social-icons a { color: white; font-size: 2.5rem; transition: 0.3s; }
        .social-icons a:hover { color: #0077ff; transform: scale(1.1); }

        /* MOBIL MOSLASHUV */
        @media (max-width: 768px) {
            body { overflow-y: auto; } /* Mobilda kichik ekranda scroll kerak bo'lishi mumkin */
            .main-card { flex-direction: column; }
            .right-side { padding-left: 0; margin-top: 20px; }
            .surname-top { top: 2% !important; }
            .firstname-top { top: 8% !important; }
        }

        /* Rasm modal */
        .modal {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="abu.mp3" type="audio/mpeg">
    </audio>

    <div class="intro-container" id="intro">
        <div id="surname">Sattorxonov</div>
        <div id="firstname">Abdurashid</div>
    </div>

    <div class="wrapper" id="wrapper">
        <div class="main-card">
            <div class="left-side">
                <img src="photo_2025-06-06_16-08-37.jpg" alt="Abdurashid" class="profile-img" id="myImg">
            </div>
            <div class="right-side">
                <div class="info-item">👤 <b>Ism:</b> Abdurashid (Abu)</div>
                <div class="info-item">🆔 <b>Familiya:</b> Sattorxonov</div>
                <div class="info-item">🗓️ <b>Tug'ilgan Yil:</b> 23.01.2012</div>
                <div class="info-item">📍 <b>Manzil:</b> Yunusobod 17kv</div>
                <div class="info-item">🎮 <b>Qiziqish:</b> O'yinlar, Kod, Edit, Mashina</div>
                <div class="info-item">💻 <b>Kasbim:</b> Xalqaro IT dasturchi</div>
                <div class="info-item">📱 <b>Qurilma:</b> Notebook, Telefon</div>
                <div class="info-item">📞 <b>Tel:</b> +998(95)-803-##-##</div>
            </div>
        </div>

        <div class="footer">
            <h3>Mening profillarim</h3>
            <div class="social-icons">
                <a href="https://www.instagram.com/abu_01088?..." target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://t.me/Abdurashid_01088" target="_blank"><i class="fab fa-telegram"></i></a>
                <a href="https://www.snapchat.com/add/abu01088" target="_blank"><i class="fab fa-snapchat"></i></a>
            </div>
        </div>
    </div>

    <div id="myModal" class="modal">
        <img id="img01" style="max-width: 90%; max-height: 90%; border: 2px solid #0077ff;">
    </div>

    <script>
        const surname = document.getElementById('surname');
        const firstname = document.getElementById('firstname');
        const wrapper = document.getElementById('wrapper');
        const intro = document.getElementById('intro');
        const music = document.getElementById('bgMusic');

        window.onload = () => {
            // 1. Ismlar SEKIN markazga keladi (bir-biridan masofa bilan)
            setTimeout(() => {
                surname.style.top = '40%'; 
                firstname.style.bottom = '40%';
            }, 100);

            // 2. 4 sekunddan keyin ismlar tepaga chiqadi va ramka ochiladi
            setTimeout(() => {
                surname.classList.add('surname-top');
                firstname.classList.add('firstname-top');
                
                // Kontentni ko'rsatish
                wrapper.style.display = 'flex';
                setTimeout(() => { 
                    wrapper.style.opacity = '1'; 
                    intro.style.background = 'transparent';
                    intro.style.pointerEvents = 'none';
                }, 500);
            }, 4500);
        };

        // Muzika ekranga bosilganda boshlanadi
        document.body.onclick = () => { music.play(); };

        // Rasm modal
        const modal = document.getElementById("myModal");
        const img = document.getElementById("myImg");
        const modalImg = document.getElementById("img01");

        img.onclick = function() { modal.style.display = "flex"; modalImg.src = this.src; }
        modal.onclick = function() { modal.style.display = "none"; }
    </script>
</body>

</html>
