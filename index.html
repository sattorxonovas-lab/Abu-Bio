<!DOCTYPE html>
<html>
<head>
    <title>--Sattorxonov || Abdurashid--</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron'; color: #fff; cursor: crosshair; }
        #stats-header { position: fixed; top: 0; left: 50%; transform: translateX(-50%); background: rgba(0,255,255,0.1); padding: 10px 40px; border-bottom: 2px solid #0ff; border-radius: 0 0 20px 20px; z-index: 100; font-weight: 900; }
        #overlay, #death-screen { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; background: radial-gradient(circle, #0a0a0a, #000); }
        .skills-container { position: fixed; bottom: 20px; left: 20px; width: 280px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border: 1px solid #444; }
        .bar-wrap { margin-bottom: 8px; }
        .bar-bg { width: 100%; height: 6px; background: #222; border-radius: 3px; border: 1px solid #333; overflow: hidden; }
        .fill { height: 100%; width: 100%; transition: 0.3s linear; }
        .active-glow { box-shadow: 0 0 15px currentColor; filter: brightness(1.5); }
        #leaderboard { position: fixed; top: 20px; left: 20px; background: rgba(0,255,255,0.05); padding: 15px; border: 1px solid #0ff; border-radius: 10px; min-width: 150px; }
        #minimap-ui { position: fixed; bottom: 20px; right: 20px; width: 160px; height: 160px; border: 2px solid #0ff; border-radius: 50%; background: rgba(0,0,0,0.7); }
        .btn { padding: 15px 40px; background: #0ff; color: #000; border: none; border-radius: 30px; font-weight: 900; cursor: pointer; margin-top: 15px; box-shadow: 0 0 10px #0ff; font-family: 'Orbitron'; }
        input { padding: 15px; background: #111; border: 2px solid #0ff; color: #fff; border-radius: 10px; text-align: center; outline: none; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="stats-header">ONLAYN: <span id="online-count">0</span></div>

    <div id="overlay">
        <h1 style="color:#0ff; letter-spacing:8px;">--Sattorxonov || Abdurashid--</h1>
        <h2 style="color: #0ff; letter-spacing:8px;">SNAKE & ARENA</h2>
        <input type="text" id="nick" placeholder="ISMINGIZ">
        <button class="btn" onclick="startTimer()">JANGGA KIRISH</button>
        <div id="timer" style="font-size:80px; color:#0ff; display:none;">5</div>
    </div>

    <div id="death-screen" style="display:none;">
        <h1 style="color:red">O'YIN TUGADI</h1>
        <div id="final-stats"></div>
        <button class="btn" onclick="fastRespawn()">MARKAZDA TIRILISH</button>
    </div>

    <div id="leaderboard"><b>TOP 5:</b><div id="rank-list"></div></div>
    
    <div class="skills-container">
        <div class="bar-wrap"><div style="font-size:9px; color:#0ff;">W: NITRO - <span id="n-st">O'CHIQ</span></div><div class="bar-bg"><div id="nitro-fill" class="fill" style="background:#0ff;"></div></div></div>
        <div class="bar-wrap"><div style="font-size:9px; color:#f0f;">SPACE: RUH - <span id="g-st">O'CHIQ</span></div><div class="bar-bg"><div id="ghost-fill" class="fill" style="background:#f0f;"></div></div></div>
        <div class="bar-wrap"><div style="font-size:9px; color:#0f0;">S: KO'RINMAS - <span id="i-st">O'CHIQ</span></div><div class="bar-bg"><div id="invis-fill" class="fill" style="background:#0f0;"></div></div></div>
        <div class="bar-wrap"><div style="font-size:9px; color:#33f;">SHIFT: QALQON - <span id="s-st">O'CHIQ</span></div><div class="bar-bg"><div id="shield-fill" class="fill" style="background:#33f;"></div></div></div>
        <div class="bar-wrap"><div style="font-size:9px; color:#f00;">E: MINA - <span id="m-st">O'CHIQ</span></div><div class="bar-bg"><div id="mine-fill" class="fill" style="background:#f00;"></div></div></div>
        <div class="bar-wrap"><div style="font-size:9px; color:#ff0;">Q: MUZLATISH - <span id="q-st">O'CHIQ</span></div><div class="bar-bg"><div id="freeze-fill" class="fill" style="background:#ff0;"></div></div></div>
    </div>

    <div id="minimap-ui"><canvas id="minimap" width="160" height="160"></canvas></div>
    <canvas id="game"></canvas>

    <script>
        const socket = io();
        const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap'), mCtx = mCanvas.getContext('2d');
        let players = {}, foods = [], mines = [], me = null, angle = 0, lastNick = "";

        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function startTimer() {
            lastNick = document.getElementById('nick').value;
            if(!lastNick) return alert("Ism?");
            document.querySelector('#overlay button').style.display = 'none';
            document.getElementById('nick').style.display = 'none';
            const t = document.getElementById('timer'); t.style.display = 'block';
            let c = 5;
            const itv = setInterval(() => { c--; t.innerText = c; if(c<=0){ clearInterval(itv); socket.emit('join', lastNick); } }, 1000);
        }

        function fastRespawn() { document.getElementById('death-screen').style.display = 'none'; socket.emit('join', lastNick); }

        socket.on('joined', () => { document.getElementById('overlay').style.display = 'none'; });
        socket.on('die', d => {
            document.getElementById('death-screen').style.display = 'flex';
            document.getElementById('final-stats').innerHTML = `BALL: ${d.score}`;
        });

        window.addEventListener('mousemove', e => {
            angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            socket.emit('input', { angle });
        });

        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            const skillMap = {'w':'boost', ' ':'ghost', 's':'invis', 'shift':'shield', 'e':'mine', 'q':'freeze'};
            if(skillMap[k]) socket.emit('toggleSkill', skillMap[k]);
        });

        socket.on('tick', d => {
            players = d.players; foods = d.foodItems; mines = d.mines; me = players[socket.id];
            document.getElementById('online-count').innerText = d.onlineCount;
            document.getElementById('rank-list').innerHTML = d.leaderboard.map((p,i)=>`<div>#${i+1} ${p.name}: ${p.score}</div>`).join('');
            
            if(me) {
                const upd = (id, val, stId, active) => {
                    document.getElementById(id).style.width = val + "%";
                    document.getElementById(stId).innerText = active ? "YONIQ" : "O'CHIQ";
                    active ? document.getElementById(id).classList.add('active-glow') : document.getElementById(id).classList.remove('active-glow');
                };
                upd('nitro-fill', me.nitro, 'n-st', me.isBoosting);
                upd('ghost-fill', me.ghostEnergy, 'g-st', me.isGhost);
                upd('invis-fill', me.invisEnergy, 'i-st', me.isInvisible);
                upd('shield-fill', me.shieldEnergy, 's-st', me.isShielded);
                upd('mine-fill', me.mineEnergy, 'm-st', me.isMining);
                upd('freeze-fill', me.freezeEnergy, 'q-st', me.isFreezing);
            }

            mCtx.clearRect(0,0,160,160);
            for(let id in players) {
                const p = players[id];
                if (p.isInvisible && id !== socket.id) continue;
                mCtx.fillStyle = p.color;
                mCtx.beginPath(); mCtx.arc((p.x/5000)*160, (p.y/5000)*160, 2, 0, 6.28); mCtx.fill();
            }
        });

        function draw() {
            ctx.setTransform(1,0,0,1,0,0);
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width, canvas.height);
            if(me) ctx.translate(canvas.width/2 - me.x, canvas.height/2 - me.y);

            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 15;
            ctx.beginPath(); ctx.arc(2500, 2500, 2500, 0, 6.28); ctx.stroke();

            foods.forEach(f => {
                ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, f.isBig?10:4, 0, 6.28); ctx.fill();
            });

            mines.forEach(m => {
                ctx.fillStyle = 'red'; ctx.shadowBlur = 15; ctx.shadowColor = 'red';
                ctx.beginPath(); ctx.arc(m.x, m.y, 8, 0, 6.28); ctx.fill(); ctx.shadowBlur = 0;
            });

            for(let id in players) {
                const p = players[id];
                if (p.isInvisible && id !== socket.id) continue;

                // Muzlagan bo'lsa xira rang
                ctx.globalAlpha = p.isFrozen ? 0.5 : (p.isGhost ? 0.3 : (p.isInvisible ? 0.15 : 1));
                
                if(p.isShielded) { ctx.shadowBlur = 20; ctx.shadowColor = '#33f'; ctx.strokeStyle = '#33f'; ctx.lineWidth = 5; }
                if(p.isFreezing) { ctx.strokeStyle = '#ff0'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, 400, 0, 6.28); ctx.stroke(); }

                p.body.forEach((part, i) => {
                    if(i % 2 !== 0) return;
                    ctx.fillStyle = p.isFrozen ? '#88ffff' : p.color; // Muzlagan bo'lsa muz rangi
                    ctx.beginPath(); ctx.arc(part.x, part.y, 16, 0, 6.28); ctx.fill();
                    if(p.isShielded) ctx.stroke();
                    if(i===0) {
                        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Orbitron";
                        ctx.fillText(p.name, part.x - 20, part.y - 35);
                        ctx.fillStyle = "black";
                        ctx.beginPath(); ctx.arc(part.x + Math.cos(p.angle+0.5)*8, part.y + Math.sin(p.angle+0.5)*8, 4, 0, 6.28); ctx.fill();
                        ctx.beginPath(); ctx.arc(part.x + Math.cos(p.angle-0.5)*8, part.y + Math.sin(p.angle-0.5)*8, 4, 0, 6.28); ctx.fill();
                    }
                });
                ctx.shadowBlur = 0;
            }
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
